name: VirtualKasa
version: 2.0.0
main: com.infinitymc.virtualkasa.VirtualKasa
api-version: 1.20
author: InfinityMC
description: Minecraft kasa (crate) sistemi - CS tarzı kasa açma
website: https://infinitymc.net

commands:
  kasa:
    description: Kasa yönetim komutları
    usage: /kasa <list|open|givekey|givecrate>
    aliases: [crate, kasalar, crates]
  adminkasa:
    description: Admin kasa yönetim komutları
    usage: /adminkasa <create|delete|edit|reload>
    permission: virtualkasa.admin
    aliases: [akasa, admincrate]

permissions:
  virtualkasa.admin:
    description: Admin kasa komutlarını kullanma izni
    default: op
  virtualkasa.use:
    description: Kasa açma izni
    default: true
  virtualkasa.open:
    description: Belirli kasaları açma izni
    default: true
  virtualkasa.givekey:
    description: Anahtar verme izni (admin)
    default: op
  virtualkasa.givecrate:
    description: Kasa verme izni (admin)
    default: op

depend: []
softdepend: [PlaceholderAPI]
